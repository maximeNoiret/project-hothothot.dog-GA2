<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>HOTHOTHOT DOG</title>
        <link rel="stylesheet" href="/styles/style.css">
        <link rel="icon" type="image/png" href="/ressources/images/favicon.png">
        <link rel="icon" type="image/x-icon" href="/ressources/images/favicon.ico">
        <link rel="icon" type="image/webp" href="/ressources/images/favicon.webp">
    </head>
    <body>
        <header>
            <h1>
                Systeme de temperature
            </h1>

            <!-- Système d'onglets accessible avec ARIA -->
            <div role="tablist" aria-label="Panneaux de température">
                <button role="tab"
                        id="btnTempsReel"
                        class="active"
                        aria-selected="true"
                        aria-controls="tempsReel"
                        tabindex="0">
                    Temps Réel
                </button>

                <button role="tab"
                        id="btnHistorique"
                        aria-selected="false"
                        aria-controls="historique"
                        tabindex="-1">
                    Historique
                </button>
            </div>
            <hr>
        </header>
        <main>
            <!-- Panneau 1: Temps Réel -->
            <div id="tempsReel"
                 role="tabpanel"
                 aria-labelledby="btnTempsReel"
                 tabindex="0">
                <h2>
                    Temperature:
                </h2>
                <p id="temperature" aria-live="polite" aria-atomic="true" aria-relevant="all"></p>
                <div id="avertTemp" role="alert">
                    <p id="message" aria-live="polite" aria-atomic="true" aria-relevant="all"></p>
                </div>
            </div>

            <!-- Panneau 2: Historique -->
            <div id="historique"
                 role="tabpanel"
                 aria-labelledby="btnHistorique"
                 tabindex="0"
                 class="hidden"
                 hidden>
                <h2>
                    Historique des temperatures:
                </h2>
                <p id="listeHistorique" aria-live="polite" aria-atomic="true" aria-relevant="all">

                </p>
            </div>
        </main>
        <script src="/scripts/main.js"></script>
    </body>
</html>
