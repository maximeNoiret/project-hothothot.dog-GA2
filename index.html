<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>HOTHOTHOT DOG</title>
        <link rel="stylesheet" href="/styles/style.css">
        </head>
    <body>
        <header>
            <nav role="navigation" aria-label="Menu principal">
            <ul>
                <li><a href="#" id="link-home" class="active">Accueil</a></li>
                <li><a href="#" id="link-doc">Documentation</a></li>
                <li class="user-actions">
                    <button id="btn-user-info">Infos Compte</button>
                    <button id="btn-logout">Déconnexion</button>
                </li>
            </ul>
            </nav>
        </header>

        <main>
            <section id="vue-accueil">
                <h1>Système de température</h1>
                
                <div role="tablist">
                    <button role="tab" id="btnTempsReel" class="active" aria-selected="true" aria-controls="tempsReel" tabindex="0">Temps Réel</button>
                    <button role="tab" id="btnHistorique" aria-selected="false" aria-controls="historique" tabindex="-1">Historique</button>
                </div>

                <div id="tempsReel" role="tabpanel" tabindex="0">
                    <p id="temperature">-- °C</p>
                    <p id="message"></p>
                </div>

                <div id="historique" role="tabpanel" tabindex="0" class="hidden" hidden>
                    <p id="listeHistorique"></p>
                </div>
            </section>

            <section id="vue-doc" hidden>
                </section>
        </main>
        
        <script type="module" src="/scripts/main.js"></script>
    </body>
</html>
